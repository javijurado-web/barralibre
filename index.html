<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14161a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Barra Libre">
<title>Barra Libre · Fase I</title>

<!-- ===== Tipografías: Barlow Condensed (atlética, dorsales) + Inter (cuerpo) ===== -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DISEÑO: "hierro al rojo" — fondo carbón, acento ámbar (acero
   caliente bajo carga). Un único acento; todo lo demás, sobrio.
   ============================================================ */
:root{
  --bg:#14161a; --surface:#1c2026; --surface-2:#242a32; --line:#2f3742;
  --text:#e8eaed; --muted:#9aa3ad; --faint:#5b6571;
  --accent:#ff6b1a; --accent-deep:#c2410c; --ok:#3fae6a;
  --warm:#ffb37a;
  --radius:14px;
  --p25:#d12c2c; --p20:#2f6fd0; --p15:#e0b020; --p10:#3aa657;
  --p5:#c8ccd2; --p2:#3a4250; --p1:#8a93a0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  background:var(--bg); color:var(--text);
  font-family:'Inter',system-ui,sans-serif; font-size:15px; line-height:1.45;
  padding-bottom:env(safe-area-inset-bottom);
  overscroll-behavior-y:contain;
}
h1,h2,h3,.cond{font-family:'Barlow Condensed',sans-serif;letter-spacing:.01em}
.num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* ---- Cabecera ---- */
header{
  position:sticky;top:0;z-index:20;background:rgba(20,22,26,.92);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
  padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand b{font-family:'Barlow Condensed';font-weight:800;font-size:20px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
.brand b span{color:var(--accent)}
.bar-icon{width:34px;height:8px;border-radius:3px;background:linear-gradient(90deg,var(--p20),var(--accent));position:relative;flex:none}
.bar-icon::before,.bar-icon::after{content:"";position:absolute;top:-4px;width:5px;height:16px;border-radius:2px;background:var(--text)}
.bar-icon::before{left:5px}.bar-icon::after{right:5px}
.session-pill{font-family:'Barlow Condensed';font-weight:700;font-size:13px;text-transform:uppercase;
  background:var(--surface-2);border:1px solid var(--line);padding:5px 11px;border-radius:999px;color:var(--warm);white-space:nowrap}

main{max-width:560px;margin:0 auto;padding:16px 14px 96px}

/* ---- Navegación inferior ---- */
nav{
  position:fixed;left:0;right:0;bottom:0;z-index:30;
  background:rgba(20,22,26,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);display:flex;justify-content:space-around;
  padding:8px 6px calc(env(safe-area-inset-bottom) + 8px);
}
nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-size:11px;font-weight:600;padding:4px 0}
nav button .ic{font-size:19px;line-height:1}
nav button.active{color:var(--accent)}

/* ---- Tarjetas ---- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;cursor:pointer}
.card-head .left{display:flex;align-items:center;gap:11px;min-width:0}
.ex-name{font-family:'Barlow Condensed';font-weight:700;font-size:19px;text-transform:uppercase;letter-spacing:.02em}
.ex-scheme{font-size:12px;color:var(--muted);font-weight:600}
.chev{color:var(--faint);transition:transform .18s;font-size:13px}
.card.open .chev{transform:rotate(90deg)}
.card-body{display:none;border-top:1px solid var(--line);padding:6px 15px 14px}
.card.open .card-body{display:block}
.done-tag{font-size:11px;font-weight:700;color:var(--ok);font-family:'Barlow Condensed';text-transform:uppercase}
.fail-tag{font-size:11px;font-weight:700;color:#e0594e;font-family:'Barlow Condensed';text-transform:uppercase}
/* Resultado conseguido / fallo */
.outcome{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0 2px;flex-wrap:wrap}
.out-q{font-size:13px;color:var(--muted);font-weight:600}
.out-btns{display:flex;gap:8px}
.out-btn{font-family:'Barlow Condensed';font-weight:700;font-size:14px;padding:8px 14px;border-radius:9px;
  background:var(--surface-2);border:1px solid var(--line);color:var(--muted)}
.out-btn.ok.sel{background:var(--ok);border-color:var(--ok);color:#0c140f}
.out-btn.no.sel{background:#e0594e;border-color:#e0594e;color:#1a0a08}
.fail-detail{margin-top:8px;padding:10px;background:rgba(224,89,78,.08);border:1px solid rgba(224,89,78,.3);border-radius:10px}
.fail-detail label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px}
.mid-tag{font-size:11px;font-weight:700;color:#e0b020;font-family:'Barlow Condensed';text-transform:uppercase}
/* Resultado de 3 estados */
.outcome3-wrap{margin:12px 0 2px}
.out-q{font-size:13px;color:var(--muted);font-weight:600;display:block;margin-bottom:8px}
.outcome3{display:flex;gap:7px}
.o3{flex:1;font-family:'Barlow Condensed';font-weight:700;font-size:14px;padding:11px 6px;border-radius:9px;
  background:var(--surface-2);border:1px solid var(--line);color:var(--muted);cursor:pointer;text-align:center}
.o3.ok.sel{background:var(--ok);border-color:var(--ok);color:#0c140f}
.o3.mid.sel{background:#e0b020;border-color:#e0b020;color:#1a1405}
.o3.no.sel{background:#e0594e;border-color:#e0594e;color:#1a0a08}
.o3-next{margin-top:9px;font-size:13px;color:var(--muted);background:var(--surface-2);border-radius:8px;padding:8px 11px}
.o3-next b{color:var(--warm)}
.o3-note{margin-top:8px}
.o3-note textarea{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;color:var(--text);padding:10px;font-size:15px;font-family:inherit}
.stall-note{background:rgba(224,89,78,.1);border:1px solid rgba(224,89,78,.35);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--warm);margin:8px 0}
.stall-note b{color:#e0594e}

/* ---- Series ---- */
.set-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--surface-2)}
.set-row:last-child{border-bottom:none}
.set-meta{flex:none;width:84px}
.set-meta .lbl{font-size:11px;color:var(--faint);font-weight:600;text-transform:uppercase}
.set-meta .reps{font-family:'Barlow Condensed';font-weight:600;font-size:15px;color:var(--muted)}
.set-w{flex:1;display:flex;align-items:baseline;gap:5px}
.set-w .kg{font-family:'Barlow Condensed';font-weight:800;font-size:30px;line-height:1}
.set-w .u{font-size:12px;color:var(--faint);font-weight:600}
.set-w.workset .kg{color:var(--warm)}
.tick{flex:none;width:42px;height:42px;border-radius:11px;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:20px;color:transparent;background:var(--surface-2);transition:.12s}
.tick.on{background:var(--ok);border-color:var(--ok);color:#0c140f}
.tick:active{transform:scale(.92)}

/* ---- Barra con discos (firma visual) ---- */
.barbell{display:flex;align-items:center;justify-content:center;gap:1px;height:38px;margin:2px 0 4px}
.barbell .sleeve{height:6px;width:26px;background:var(--faint);border-radius:2px}
.plate{border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed';font-weight:700;font-size:10px;color:#0c0f13;min-width:11px}
.plate.t{color:#fff}
.platecalc-note{font-size:11px;color:var(--faint);text-align:center;margin-top:-2px}

/* ---- Botones ---- */
.btn{display:block;width:100%;text-align:center;font-family:'Barlow Condensed';font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;font-size:17px;padding:15px;border-radius:12px;background:var(--accent);color:#160a02}
.btn:active{filter:brightness(.92)}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.btn.deep{background:var(--accent-deep);color:#fff}
.btn-row{display:flex;gap:10px;margin:14px 0}
.btn-row .btn{margin:0}

/* ---- Inputs ---- */
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
input[type=number],input[type=text],input[type=date],select,textarea{
  width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:10px;
  color:var(--text);padding:12px;font-size:16px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.inline-num{width:70px!important;padding:8px!important;text-align:center}

/* ---- Varios ---- */
.eyebrow{font-family:'Barlow Condensed';font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);font-size:13px;margin:2px 0 10px}
.h-big{font-family:'Barlow Condensed';font-weight:800;font-size:30px;text-transform:uppercase;line-height:1.05;margin:0 0 4px}
.sub{color:var(--muted);font-size:13px;margin:0 0 18px}
.help{font-size:13px;color:var(--muted);background:var(--surface-2);border-left:3px solid var(--accent);
  border-radius:8px;padding:11px 13px;margin-top:8px}
.help b{color:var(--text)}
.help .pageref{display:inline-block;margin-top:6px;color:var(--warm);font-weight:600;font-size:12px}
.acc-input{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:8px 0}
.acc-input span{font-size:13px;color:var(--muted)}
.progress-pick{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.progress-pick button{font-family:'Barlow Condensed';font-weight:700;font-size:13px;padding:7px 11px;border-radius:8px;
  background:var(--surface);border:1px solid var(--line);color:var(--muted)}
.progress-pick button.sel{background:var(--accent);color:#160a02;border-color:var(--accent)}
.spark{width:100%;height:120px;display:block;background:var(--surface);border:1px solid var(--line);border-radius:12px}
.stat-line{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--surface-2);font-size:14px}
.stat-line:last-child{border:none}
.stat-line b{font-family:'Barlow Condensed';font-weight:700;color:var(--warm);font-size:18px}
.toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);background:var(--accent);color:#160a02;
  font-weight:700;font-family:'Barlow Condensed';text-transform:uppercase;padding:11px 20px;border-radius:999px;
  z-index:50;opacity:0;transition:.25s;pointer-events:none;font-size:14px;letter-spacing:.03em}
.toast.show{opacity:1}
.failtoggle{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px;color:var(--muted)}
.failtoggle input{width:auto}
hr.sep{border:none;border-top:1px solid var(--line);margin:18px 0}
.tiny{font-size:12px;color:var(--faint)}
.center{text-align:center}
/* Modal de confirmación propio (no depende del confirm() nativo) */
.modal{position:fixed;inset:0;z-index:60;background:rgba(8,9,11,.7);backdrop-filter:blur(3px);
  display:none;align-items:center;justify-content:center;padding:24px}
.modal.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;max-width:340px;width:100%}
.modal-box p{margin:0 0 18px;font-size:15px;white-space:pre-line;text-align:left}
.modal-box .btn-row{margin:0}
/* Temporizador de descanso flotante */
.rest-pill{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(20px);z-index:40;
  display:none;align-items:center;gap:12px;background:var(--accent);color:#160a02;
  padding:10px 14px 10px 18px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.4);
  font-family:'Barlow Condensed';font-weight:700;opacity:0;transition:.25s}
.rest-pill.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
.rest-pill .rest-lbl{text-transform:uppercase;font-size:13px;letter-spacing:.05em;opacity:.8}
.rest-pill #rest-time{font-size:24px;min-width:62px;text-align:center;font-variant-numeric:tabular-nums}
.rest-pill #rest-skip{background:rgba(0,0,0,.18);color:#160a02;width:28px;height:28px;border-radius:50%;font-size:14px;font-weight:700}
/* Calendario */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px}
.cal-nav{font-size:26px;color:var(--accent);width:42px;height:42px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal-dow div{text-align:center;font-size:11px;color:var(--faint);font-weight:700;padding-bottom:4px;font-family:'Barlow Condensed'}
.cal-cell{aspect-ratio:1;border-radius:9px;background:var(--surface);border:1px solid var(--line);
  position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;min-height:42px}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.f{background:rgba(255,107,26,.14);border-color:rgba(255,107,26,.4)}
.cal-cell.h{background:rgba(255,179,122,.12);border-color:rgba(255,179,122,.35)}
.cal-cell.today{outline:2px solid var(--accent);outline-offset:-1px}
.cal-d{font-family:'Barlow Condensed';font-weight:600;font-size:13px;color:var(--muted)}
.cal-lab{font-family:'Barlow Condensed';font-weight:700;font-size:11px;color:var(--warm);line-height:1}
.cal-cell.f .cal-lab{color:var(--accent)}
.cal-chk{position:absolute;top:2px;right:4px;font-size:10px;color:var(--ok)}
.cal-legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:12px 0}
.cal-legend .lg{width:13px;height:13px;border-radius:4px;display:inline-block}
.cal-legend .lg.f{background:rgba(255,107,26,.45)}
.cal-legend .lg.h{background:rgba(255,179,122,.4)}
.cal-legend .lg.tdy{outline:2px solid var(--accent);outline-offset:-2px;background:transparent}
/* Nav: 6 pestañas */
nav button{font-size:10px}
nav button .ic{font-size:18px}
/* ===== Nutrición ===== */
.pyramid{display:flex;flex-direction:column;gap:4px;margin:6px 0 4px}
.pyr-row{display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 12px}
.pyr-row .lvl{font-family:'Barlow Condensed';font-weight:700;color:var(--accent);font-size:13px;min-width:96px;text-transform:uppercase}
.pyr-row small{color:var(--muted);font-size:12px}
.note{background:var(--surface-2);border-left:3px solid var(--accent);border-radius:8px;padding:11px 13px;font-size:13.5px;color:var(--muted);margin:10px 0}
.note b{color:var(--text)}
.note.warn{border-left-color:#e0594e}
.lead{color:var(--muted);margin-bottom:14px}
.sub2{font-family:'Barlow Condensed';font-weight:700;font-size:20px;text-transform:uppercase;margin:22px 0 8px;color:var(--warm)}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.res-block{margin-top:16px;border-top:1px solid var(--line);padding-top:6px}
.res-row{display:flex;justify-content:space-between;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--surface-2)}
.res-row:last-child{border:none}
.res-row .rn{font-weight:600;font-size:14px}
.res-row .rn small{display:block;color:var(--faint);font-weight:500;font-size:11.5px}
.res-row .kcal{font-family:'Barlow Condensed';font-weight:800;font-size:21px;color:var(--warm)}
.res-row .macros{font-family:'Barlow Condensed';font-weight:600;font-size:13px;color:var(--muted);text-align:right;min-width:118px}
.ntabs{display:flex;gap:6px;overflow-x:auto;margin:0 0 14px;padding-bottom:4px}
.ntabs button{flex:none;font-family:'Barlow Condensed';font-weight:700;font-size:13px;padding:8px 12px;border-radius:9px;
  background:var(--surface);border:1px solid var(--line);color:var(--muted);text-transform:uppercase;white-space:nowrap}
.ntabs button.sel{background:var(--accent);border-color:var(--accent);color:#160a02}
.phase{display:none}.phase.show{display:block}
.tag{display:inline-block;font-family:'Barlow Condensed';font-weight:700;font-size:11px;text-transform:uppercase;padding:3px 9px;border-radius:999px;margin:0 5px 5px 0}
.tag.bloc{background:rgba(255,107,26,.16);color:var(--warm);border:1px solid rgba(255,107,26,.4)}
.tag.sup{background:rgba(63,174,106,.14);color:#7fd6a0;border:1px solid rgba(63,174,106,.35)}
.kv{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--surface-2);font-size:14px}
.kv:last-child{border:none}
.kv .k{font-weight:600;min-width:104px;color:var(--warm)}
.macro-pill{display:inline-flex;gap:5px;align-items:baseline;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;margin:3px 5px 3px 0;font-size:13px}
.macro-pill b{font-family:'Barlow Condensed';color:var(--warm);font-size:15px}
.foodcol{margin:10px 0}
.foodcol .lbl{font-family:'Barlow Condensed';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.fdot{width:9px;height:9px;border-radius:50%;display:inline-block}
.fdot.ok{background:var(--ok)}.fdot.mod{background:#e0b020}.fdot.no{background:#e0594e}
.foodcol .items{font-size:13.5px;color:var(--muted);line-height:1.7}
/* Selector de día Fuerza / HIIT */
.day-toggle{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:5px}
.day-toggle .dt{flex:1;font-family:'Barlow Condensed';font-weight:700;font-size:16px;text-transform:uppercase;
  padding:11px;border-radius:9px;background:transparent;color:var(--muted);border:none;cursor:pointer;letter-spacing:.03em}
.day-toggle .dt.sel{background:var(--accent);color:#160a02}
.pdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--warm);vertical-align:middle;margin-left:2px}
.day-toggle .dt.sel .pdot{background:#160a02}
</style>
</head>
<body>

<header>
  <div class="brand"><span class="bar-icon"></span><b>BARRA<span>LIBRE</span></b></div>
  <div class="session-pill" id="pill">—</div>
</header>

<main id="app"></main>

<nav>
  <button data-view="hoy" class="active"><span class="ic">🏋️</span>Hoy</button>
  <button data-view="calendario"><span class="ic">🗓️</span>Plan</button>
  <button data-view="historial"><span class="ic">📋</span>Historial</button>
  <button data-view="progreso"><span class="ic">📈</span>Progreso</button>
  <button data-view="nutricion"><span class="ic">🥩</span>Dieta</button>
  <button data-view="ajustes"><span class="ic">⚙️</span>Ajustes</button>
</nav>

<div class="toast" id="toast"></div>

<div class="rest-pill" id="rest">
  <span class="rest-lbl">Descanso</span>
  <span id="rest-time">2:00</span>
  <button id="rest-skip" aria-label="Saltar descanso">✕</button>
</div>

<div class="modal" id="modal"><div class="modal-box">
  <p id="modal-msg"></p>
  <div class="btn-row">
    <button class="btn ghost" id="modal-no">Cancelar</button>
    <button class="btn deep" id="modal-yes">Borrar</button>
  </div>
</div></div>

<script>
/* ====================================================================
   BARRA LIBRE · FASE I (NOVATOS) — motor fiel al Excel "DiarioBarraLibre"
   --------------------------------------------------------------------
   Idea central: en la Fase I NO se "adivina" nada. El peso de cada
   sesión está predeterminado por tu 5RM y un incremento fijo. La app
   solo lo MUESTRA y te deja registrar lo que hiciste.
   Fórmulas replicadas del Excel:
     peso_trabajo_inicial = ROUND((5RM - 5RM*descarga)/minInc) * minInc
     y luego se suma 'incremento' cada vez que el ejercicio aparece.
   ==================================================================== */

/* ---------- 1) Configuración por defecto (editable en Ajustes) ---------- */
const DEFAULTS = {
  minInc: 2.5,      // base de redondeo = salto mínimo cargable (1.25 kg/lado)
  descarga: 0.10,   // % descarga inicial sobre el 5RM
  bar: 20,          // peso de la barra (kg)
  plates: [20,10,5,2.5,1.25,1,0.5], // discos disponibles por lado (kg)
  restSec: 120,     // descanso entre series (segundos)
  planStart: null,  // fecha (ISO) del primer entrenamiento, para el calendario
  nutri: {},        // datos para la calculadora de nutrición (edad, altura, peso, grasa)
  rm: { sentadilla:80, banca:50, peso_muerto:100, militar:30, clean:30 }
};

/* Definición de los 5 básicos.
   day: en qué días aparece ('AB' ambos, 'A' solo A, 'B' solo B)
   inc: incremento por aparición · work: esquema de trabajo
   wuType: tipo de rampa de calentamiento · page: pág. del libro */
const LIFTS = {
  sentadilla:  {label:'Sentadilla',   day:'AB', inc:5, work:{sets:3,reps:5}, wuType:'squat', page:62,
                cues:['Barra sobre el trapecio, no sobre el cuello.','Rodillas hacia fuera, en línea con los pies.','Baja hasta romper paralelo; pecho arriba.','Empuja el suelo con todo el pie.']},
  banca:       {label:'Press banca',  day:'A',  inc:2.5, work:{sets:3,reps:5}, wuType:'press', page:70,
                cues:['Omóplatos juntos y hundidos en el banco.','Barra a la línea del pezón, codos ~45°.','Pies firmes, ligero arco lumbar natural.','Bloquea arriba sin "rebotar" en el pecho.']},
  peso_muerto: {label:'Peso muerto',  day:'A',  inc:5, work:{sets:2,reps:5}, wuType:'dead', page:66,
                cues:['Barra pegada a la espinilla al iniciar.','Espalda neutra, dorsales activos ("rompe la barra").','Empuja el suelo; cadera y hombros suben juntos.','Bloqueo arriba sin hiperextender.']},
  militar:     {label:'Press militar',day:'B',  inc:2.5, work:{sets:3,reps:5}, wuType:'press', page:75,
                cues:['Barra sobre las clavículas, codos algo adelante.','Aprieta glúteos y abdomen: nada de arqueo lumbar.','Mete la cabeza al pasar la barra la frente.','Bloquea con la barra sobre la coronilla.']},
  clean:       {label:'Clean (cargada)',day:'B',inc:2.5, work:{sets:5,reps:3}, wuType:'press', page:77,
                cues:['Usa tu 3RM como referencia, no el 5RM.','Tirón explosivo; extensión de cadera, tobillo y rodilla.','Recibe en cuarto de sentadilla, codos altos y rápidos.','Técnica > peso: para si pierdes la posición.']}
};

/* Accesorios por día (se registran a mano).
   Según el detalle "sesión A / sesión B" del libro:
   dominada PRONA en A, SUPINA en B (el Excel los tiene al revés). */
const ACCESSORIES = {
  A:[ {id:'chin', label:'Dominada agarre prono',          scheme:'3 series al fallo + lastre', kind:'amrap', page:90},
      {id:'plank',label:'Plancha abdominal',              scheme:'2 series · 2 min',           kind:'time',  page:88} ],
  B:[ {id:'chinS',label:'Dominada agarre supino (chin-up)',scheme:'3 series al fallo + lastre', kind:'amrap', page:90},
      {id:'plankL',label:'Plancha lateral',               scheme:'2 series · 1 min por lado',  kind:'time',  page:88} ]
};

/* HIIT: sesión semanal independiente que rota 1→4. Datos funcionales
   (rondas y movimientos) del programa; detalle completo en el libro p.169-170. */
const HIIT = {
  1:{tag:'HIIT 01', tipo:'Calistenia', desc:'3 rondas · al menor tiempo posible',
     items:['10 dominadas','20 flexiones','30 sentadillas','40 escaladores (20 por pierna)','50 saltos de cuerda (o 50 elevaciones de rodilla)']},
  2:{tag:'HIIT 02', tipo:'Calistenia', desc:'5 rondas',
     items:['Sentadilla — 1 min','Flexiones — 1 min','Burpees — 1 min','Descanso — 1 min']},
  3:{tag:'HIIT 03', tipo:'Kettlebell', desc:'3 rondas · descanso 1 min entre rondas',
     items:['10 thrusters','15 swings','20 flexiones','30 sentadillas','15 burpees','10 snatches']},
  4:{tag:'HIIT 04', tipo:'Kettlebell', desc:'3 rondas · descanso 1 min entre rondas',
     items:['5 snatches por lado','5 thrusters por lado','10 flexiones','5 high pulls por lado','10 dominadas','5 squats en rack por lado','5 swings a una mano por lado','10 burpees','5 clean & press por lado','10 fondos en paralelas']}
};

const TOTAL_SESSIONS = 24;
const WEEKS = 8;
const weekOf = s => Math.ceil(s/3);            // 3 sesiones de fuerza por semana
const hiitOfWeek = w => ((w-1)%4)+1;           // rota HIIT 1→2→3→4→1...
// Semana de HIIT a mostrar: la de la ÚLTIMA fuerza completada (el HIIT va al
// final del microciclo, después de las 3 sesiones de fuerza de esa semana).
function currentHiitWeek(){ return Math.min(WEEKS, Math.max(1, weekOf(lastCompletedSession()))); }

/* ---------- 2) Estado persistente (localStorage) ---------- */
const KEY='barralibre_v1';
let S = load();
if(!S.hiit) S.hiit={};   // migración para guardados anteriores
if(!S.cfg.nutri) S.cfg.nutri={};
if(lastCompletedSession()===0) S.current=1;  // sin historial -> empezar en Sesión 1 (día A)
function load(){
  try{ const r=JSON.parse(localStorage.getItem(KEY)); if(r&&r.cfg) return r; }catch(e){}
  return { cfg:structuredClone(DEFAULTS), current:1, onboarded:false, logs:{}, notes:{}, hiit:{} };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

/* ---------- 3) Motor de cálculo ---------- */
const floorTo=(x,s)=>Math.floor(x/s)*s;
const round=(x)=>Math.round(x); // JS redondea .5 hacia arriba, igual que el Excel

// Conjunto de pesos por lado alcanzables con tus discos (knapsack ilimitado, rejilla 0,25)
let _reachCache=null,_reachKey='';
function reachable(){
  const key=S.cfg.plates.join(',');
  if(_reachKey===key&&_reachCache) return _reachCache;
  const step=0.25, N=Math.round(200/step)+1, r=new Array(N).fill(false); r[0]=true;
  S.cfg.plates.filter(p=>p>0).forEach(p=>{ const pi=Math.round(p/step); if(pi>0) for(let i=pi;i<N;i++) if(r[i-pi]) r[i]=true; });
  _reachCache=r; _reachKey=key; return r;
}
function isLoadable(w){
  const bar=S.cfg.bar; if(w<bar-1e-9) return false;
  const per=(w-bar)/2, idxf=per/0.25, idx=Math.round(idxf);
  if(Math.abs(idxf-idx)>1e-6) return false;      // no cae en la rejilla
  const r=reachable(); return idx>=0&&idx<r.length&&r[idx];
}
// Ajusta cualquier peso al cargable más cercano con tus discos reales.
function nearestLoadable(target){
  const bar=S.cfg.bar; if(target<=bar) return bar;
  for(let d=0; d<=20.0001; d+=0.25){
    if(isLoadable(target-d)) return Math.round((target-d)*100)/100;
    if(isLoadable(target+d)) return Math.round((target+d)*100)/100;
  }
  return Math.round(target*2)/2;
}

function startWork(liftKey){
  const rm=S.cfg.rm[liftKey], d=S.cfg.descarga, m=S.cfg.minInc;
  return round((rm - rm*d)/m)*m;
}
// nº de veces que el ejercicio ha aparecido hasta la sesión s (incluida)
function occurrences(day, s){
  if(day==='AB') return s;
  if(day==='A')  return Math.ceil(s/2);   // aparece en impares 1,3,5...
  if(day==='B')  return Math.floor(s/2);  // aparece en pares 2,4,6...
}
function appearsIn(day,s){ const isA = s%2===1; return day==='AB' || (day==='A'&&isA) || (day==='B'&&!isA); }

/* ¿Falló este ejercicio en la sesión s? */
function liftFailed(s, liftKey){ const o=S.logs[s]&&S.logs[s].out&&S.logs[s].out[liftKey]; return !!(o&&o.r==='fallo'); }
/* Incremento ganado en una sesión registrada, según el resultado (regla del libro):
   limpio = incremento completo · forzado = mitad · fallo = 0 (repite peso) */
function incEarned(liftKey, p){
  const L=LIFTS[liftKey];
  const o=S.logs[p]&&S.logs[p].out&&S.logs[p].out[liftKey];
  const r=o?o.r:'limpio';                 // registrada sin marcar = se considera limpio
  if(r==='fallo') return 0;
  if(r==='forzado') return L.inc/2;
  return L.inc;
}
/* Nº de apariciones del ejercicio en [desde, hasta) */
function appearancesBetween(liftKey, desde, hasta){
  const day=LIFTS[liftKey].day; let n=0;
  for(let p=desde;p<hasta;p++) if(appearsIn(day,p)) n++;
  return n;
}
/* Fallos consecutivos más recientes (para detectar estancamiento) */
function consecutiveFails(liftKey){
  const day=LIFTS[liftKey].day, apps=[];
  for(let p=1;p<=TOTAL_SESSIONS;p++) if(appearsIn(day,p)&&sessionLogged(p)) apps.push(p);
  let c=0; for(let i=apps.length-1;i>=0;i--){ if(liftFailed(apps[i],liftKey)) c++; else break; }
  return c;
}

/* PESO DE TRABAJO — parte del peso inicial y SUMA el incremento ganado en cada
   sesión registrada anterior (completo, medio o cero según el resultado).
   Para sesiones futuras se proyecta asumiendo "limpio". */
function workWeight(liftKey, s){
  const L=LIFTS[liftKey];
  if(!appearsIn(L.day, s)) return null;
  const frontier = lastCompletedSession()+1;
  let w=startWork(liftKey);
  const upto = (s<=frontier) ? s : frontier;
  for(let p=1;p<upto;p++) if(appearsIn(L.day,p)&&sessionLogged(p)) w+=incEarned(liftKey,p);
  if(s>frontier) w += appearancesBetween(liftKey, frontier, s)*L.inc; // proyección optimista
  return w;
}

// Rampa de calentamiento según tipo (porcentajes del Excel)
function warmups(W, type){
  const F=(p)=>Math.max(20, floorTo(p*W,5));
  const F0=(p)=>floorTo(p*W,5); // squat no aplica mínimo de 20
  if(type==='squat') return [{r:'2×5',w:20},{r:'1×5',w:F0(.4)},{r:'1×3',w:F0(.6)},{r:'1×2',w:F0(.8)}];
  if(type==='press') return [{r:'2×5',w:20},{r:'1×5',w:F(.5)},{r:'1×3',w:F(.7)},{r:'1×2',w:F(.85)}];
  if(type==='dead')  return [{r:'2×5',w:20},{r:'1×3',w:F(.6)},{r:'1×2',w:F(.85)}];
  return [];
}

// Construye la sesión completa s (lista de ejercicios con sets)
function buildSession(s){
  const isA = s%2===1;
  const day = isA?'A':'B';
  const order = isA ? ['sentadilla','banca','peso_muerto'] : ['sentadilla','militar','clean'];
  const lifts = order.map(k=>{
    const W=nearestLoadable(workWeight(k,s)); const L=LIFTS[k];
    const wu=warmups(W,L.wuType).map(x=>({...x, w:nearestLoadable(x.w), work:false}));
    const work=Array.from({length:L.work.sets},()=>({r:`1×${L.work.reps}`,w:W,work:true}));
    return {key:k, label:L.label, scheme:`${L.work.sets}×${L.work.reps}`, W, sets:[...wu,...work], page:L.page};
  });
  return {s, day, lifts, accessories:ACCESSORIES[day]};
}

/* ---------- 4) Calculadora de discos ---------- */
function plateBreakdown(target){
  const bar=S.cfg.bar;
  if(target<=bar) return [];
  let perSide=(target-bar)/2, out=[];
  for(const p of [...S.cfg.plates].sort((a,b)=>b-a)){
    while(perSide+1e-9>=p){ out.push(p); perSide=Math.round((perSide-p)*100)/100; }
  }
  return out; // discos por lado, de mayor a menor
}
const plateColor=(p)=>({25:'var(--p25)',20:'var(--p20)',15:'var(--p15)',10:'var(--p10)',5:'var(--p5)',2.5:'var(--p2)',1.25:'var(--p1)',1:'var(--p1)'}[p]||'var(--p1)');
function barbellHTML(target){
  const ps=plateBreakdown(target);
  const left=ps.map(p=>{
    const h=22+p*0.9, dark=[25,20,10,2.5].includes(p)?'t':'';
    return `<div class="plate ${dark}" style="height:${h}px;width:${Math.max(11,p*0.5+8)}px;background:${plateColor(p)}">${p}</div>`;
  }).join('');
  const right=ps.slice().reverse().map(p=>{
    const h=22+p*0.9, dark=[25,20,10,2.5].includes(p)?'t':'';
    return `<div class="plate ${dark}" style="height:${h}px;width:${Math.max(11,p*0.5+8)}px;background:${plateColor(p)}">${p}</div>`;
  }).join('');
  const txt = ps.length? `${S.cfg.bar} + ${ps.map(p=>p).join(' + ')} por lado` : `Solo barra (${S.cfg.bar} kg)`;
  return `<div class="barbell">${left}<div class="sleeve"></div><div class="sleeve" style="width:40px"></div><div class="sleeve"></div>${right}</div>
          <div class="platecalc-note">${txt}</div>`;
}

/* ---------- 5) Helpers de log ---------- */
function logFor(s){ if(!S.logs[s]) S.logs[s]={sets:{}, acc:{}, out:{}, notes:{}, date:null}; const l=S.logs[s]; if(!l.out)l.out={}; if(!l.notes)l.notes={};
  if(l.fail){ for(const k in l.fail){ if(!l.out[k]) l.out[k]={r:'fallo', note:l.fail[k]||''}; } delete l.fail; } // migra formato antiguo
  return l; }
function setKey(liftKey,i){ return liftKey+'_'+i; }
function toggleSet(s,liftKey,i){
  const lg=logFor(s); const k=setKey(liftKey,i);
  lg.sets[k]=!lg.sets[k]; if(!lg.date) lg.date=new Date().toISOString().slice(0,10);
  save();
}
function sessionDone(s){
  const ses=buildSession(s), lg=S.logs[s]; if(!lg) return false;
  return ses.lifts.every(L=>L.sets.every((_,i)=>lg.sets[setKey(L.key,i)]));
}
// Última sesión con fecha registrada (0 si ninguna) y recálculo de "hoy".
function lastCompletedSession(){
  const dated=Object.keys(S.logs).map(Number).filter(s=>S.logs[s] && S.logs[s].date);
  return dated.length? Math.max(...dated):0;
}
function recomputeCurrent(){ S.current = Math.min(TOTAL_SESSIONS, lastCompletedSession()+1); }
function sessionLogged(s){ return !!(S.logs[s] && S.logs[s].date); }

/* ====================================================================
   6) VISTAS
   ==================================================================== */
let view='hoy';
const app=document.getElementById('app');
const pill=document.getElementById('pill');

function render(){
  pill.textContent = S.onboarded ? `Sem ${weekOf(S.current)} · S${S.current}/${TOTAL_SESSIONS} · Día ${S.current%2?'A':'B'}` : 'Bienvenido';
  if(!S.onboarded){ renderOnboarding(); return; }
  if(view==='hoy') renderHoy();
  else if(view==='calendario') renderCalendario();
  else if(view==='historial') renderHistorial();
  else if(view==='progreso') renderProgreso();
  else if(view==='nutricion') renderNutricion();
  else renderAjustes();
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('active', b.dataset.view===view));
}

/* ---- HOY ---- */
/* Próximo entrenamiento pendiente en el microciclo (3 fuerza + 1 HIIT por semana) */
function nextTraining(){
  for(let w=1;w<=WEEKS;w++){
    for(let k=0;k<3;k++){
      const s=(w-1)*3+k+1; if(s>TOTAL_SESSIONS) break;
      if(!sessionLogged(s)) return {type:'fuerza', s, w};
    }
    if(!(S.hiit[w] && S.hiit[w].done)) return {type:'hiit', w};
  }
  return {type:'done'};
}

let hoyMode=null; // 'fuerza' | 'hiit' — qué entrenas hoy
function renderHoy(){
  const nt=nextTraining();
  if(hoyMode===null) hoyMode = (nt.type==='hiit') ? 'hiit' : 'fuerza';
  const w=currentHiitWeek();
  const hiitPending = !(S.hiit[w] && S.hiit[w].done);
  const toggle=`<div class="day-toggle">
      <button class="dt ${hoyMode==='fuerza'?'sel':''}" data-mode="fuerza">🏋️ Fuerza</button>
      <button class="dt ${hoyMode==='hiit'?'sel':''}" data-mode="hiit">🔥 HIIT${hiitPending?' <span class="pdot"></span>':''}</button>
    </div>`;

  if(hoyMode==='hiit'){
    // ----- DÍA DE HIIT (sesión independiente) -----
    const def=HIIT[hiitOfWeek(w)]; const log=S.hiit[w]||{};
    app.innerHTML=`${toggle}
      <p class="eyebrow">HIIT · Semana ${w} · día independiente</p>
      <h2 class="h-big" style="font-size:26px;margin-bottom:6px">${def.tag} · ${def.tipo}</h2>
      <p class="sub">Es una sesión aparte, en un día <b>sin fuerza</b>.</p>
      <div id="hiitday"></div>
      <div class="btn-row">
        <button class="btn" id="hiitDone">${log.done?'✓ HIIT completado · guardar de nuevo':'Completar HIIT ›'}</button>
      </div>
      <p class="tiny center">Apunta tu resultado y el día en que lo hiciste.</p>`;
    document.getElementById('hiitday').appendChild(hiitCard());
    document.getElementById('hiitDone').onclick=()=>{
      const cur=S.hiit[w]||{}; cur.done=true; cur.tag=def.tag;
      cur.date=cur.date||new Date().toISOString().slice(0,10);
      S.hiit[w]=cur; save();
      hoyMode='fuerza'; renderHoy(); window.scrollTo(0,0);
      toast('HIIT guardado · a por la fuerza');
    };
  } else {
    // ----- DÍA DE FUERZA -----
    const ses=buildSession(S.current);
    const lg=S.logs[S.current]||{sets:{},acc:{},out:{},notes:{}};
    app.innerHTML=`${toggle}
      <p class="eyebrow">Sesión ${S.current} · Entrenamiento ${ses.day}</p>
      <h2 class="h-big" style="font-size:26px;margin-bottom:14px">${ses.day==='A'?'Sentadilla · Banca · Peso muerto':'Sentadilla · Militar · Clean'}</h2>
      <div id="lifts"></div>
      <hr class="sep">
      <p class="eyebrow">Accesorios</p>
      <div id="acc"></div>
      <div class="btn-row">
        <button class="btn ghost" id="prevBtn">‹ Anterior</button>
        <button class="btn" id="doneBtn">Completar sesión ›</button>
      </div>
      <p class="tiny center">El peso de cada sesión ya está calculado. Marca las series que completes.</p>`;
    const cont=document.getElementById('lifts');
    ses.lifts.forEach(L=>cont.appendChild(liftCard(L,lg)));
    const acc=document.getElementById('acc');
    ses.accessories.forEach(a=>acc.appendChild(accCard(a,lg)));
    document.getElementById('prevBtn').onclick=()=>{ if(S.current>1){S.current--;save();renderHoy();} };
    document.getElementById('doneBtn').onclick=()=>{
      const s=S.current, sesNow=buildSession(s), log=logFor(s);
      const afectados=sesNow.lifts.filter(L=>{ const o=log.out[L.key]; return o&&(o.r==='forzado'||o.r==='fallo'); });
      const guardar=()=>{
        const l=logFor(s);
        l.date ||= new Date().toISOString().slice(0,10);
        if(s===1 && !S.cfg.planStart) S.cfg.planStart=l.date; // ancla el calendario
        const wasLast = s>=TOTAL_SESSIONS;
        recomputeCurrent(); save();
        const nt2=nextTraining();
        hoyMode = (nt2.type==='hiit') ? 'hiit' : 'fuerza';   // si toca HIIT, sugiérelo
        renderHoy(); window.scrollTo(0,0);
        toast(wasLast ? '¡Fase I completada! 🎉' : (nt2.type==='hiit'?'Fuerza guardada · ahora toca HIIT':'Sesión guardada'));
      };
      if(afectados.length){
        let msg='Vas a guardar el día con estos resultados:\n\n';
        afectados.forEach(L=>{
          const o=log.out[L.key];
          if(o.r==='fallo') msg+=`• ${L.label} — FALLO: la próxima vez repites ${L.W} kg (no subes)\n`;
          else { const nw=nearestLoadable(L.W+LIFTS[L.key].inc/2); msg+=`• ${L.label} — FORZADO: la próxima vez +${+(nw-L.W).toFixed(2)} kg → ${nw} kg\n`; }
        });
        msg+='\nEsto se aplicará a partir de ahora. ¿Guardar?';
        askConfirm(msg, guardar, 'Guardar');
      } else guardar();
    };
  }
  // selector de día (común a ambos modos)
  document.querySelectorAll('.day-toggle .dt').forEach(b=>b.onclick=()=>{ hoyMode=b.dataset.mode; renderHoy(); window.scrollTo(0,0); });
}

function liftCard(L,lg){
  const div=document.createElement('div'); div.className='card';
  const allDone=L.sets.every((_,i)=>lg.sets[setKey(L.key,i)]);
  const oc=(lg.out&&lg.out[L.key])||{}; const r=oc.r||'';
  const stalled=consecutiveFails(L.key)>=3;
  if(allDone||r) div.classList.add('open');
  div.innerHTML=`
    <div class="card-head">
      <div class="left"><span class="ex-name">${L.label}</span></div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="ex-scheme">${L.scheme} · ${L.W} kg</span>
        ${outcomeBadge(r,allDone)}
        <span class="chev">▶</span>
      </div>
    </div>
    <div class="card-body">
      ${L.sets.map((st,i)=>`
        <div class="set-row">
          <div class="set-meta"><div class="lbl">${st.work?'Trabajo':'Calent.'}</div><div class="reps">${st.r}</div></div>
          <div class="set-w ${st.work?'workset':''}"><span class="kg">${st.w}</span><span class="u">kg</span></div>

        </div>`).join('')}

      ${stalled?`<div class="stall-note">⚠️ Llevas 3 fallos seguidos en ${L.label}: estás <b>estancado</b>. Toca <b>descarga</b> (la añadimos en el siguiente paso).</div>`:''}

        </div>

        <textarea rows="2" data-note="${L.key}" placeholder="Sensaciones, dolores, ajustes...">${(lg.notes&&lg.notes[L.key])||''}</textarea></div>
    </div>`;
  // eventos
  div.querySelector('.card-head').onclick=(e)=>{ if(!e.target.closest('.tick')) div.classList.toggle('open'); };
  div.querySelectorAll('.tick').forEach(t=>t.onclick=(e)=>{
    e.stopPropagation();
    const turningOn=!t.classList.contains('on');
    toggleSet(S.current,t.dataset.lift,parseInt(t.dataset.i));
    t.classList.toggle('on');
    if(turningOn && t.dataset.work==='1') startRest();
  });
  // resultado: limpio / forzado / fallo (provisional hasta guardar la sesión)
  div.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{
    applyOutcome(div, b.dataset.lift, b.dataset.r, L.W);
  });
  div.querySelector('[data-outnote]').addEventListener('change',e=>{ const log=logFor(S.current); log.out[L.key]=log.out[L.key]||{r:'limpio'}; log.out[L.key].note=e.target.value; save(); });
  div.querySelector('[data-note]').addEventListener('change',e=>{ const log=logFor(S.current); log.notes[L.key]=e.target.value; save(); });
  return div;
}
function outcomeBadge(r,allDone){
  if(r==='fallo') return '<span class="fail-tag">❌ Fallo</span>';
  if(r==='forzado') return '<span class="mid-tag">🟡 Forzado</span>';
  if(r==='limpio'||allDone) return '<span class="done-tag">✓ Limpio</span>';
  return '';
}
function nextPreview(lift, r, curW){
  const inc=LIFTS[lift].inc;
  if(r==='fallo') return `Si lo guardas así · próxima vez: <b>mismo peso, ${curW} kg</b> (lo repites)`;
  const delta=(r==='forzado')?inc/2:inc;
  const nextW=nearestLoadable(curW+delta);
  return `Si lo guardas así · próxima vez: <b>+${+(nextW-curW).toFixed(2)} kg → ${nextW} kg</b>${r==='forzado'?' (medio incremento)':''}`;
}
function applyOutcome(div, lk, r, curW){
  const log=logFor(S.current); log.out[lk]={...(log.out[lk]||{}), r}; save();
  div.querySelectorAll('[data-r]').forEach(x=>x.classList.toggle('sel', x.dataset.r===r));
  const nx=div.querySelector('[data-next]'); if(nx) nx.innerHTML=nextPreview(lk,r,curW);
  const nw=div.querySelector('[data-notewrap]'); if(nw) nw.classList.toggle('hidden', !(r==='forzado'||r==='fallo'));
  const head=div.querySelector('.card-head > div:last-child');
  const old=head.querySelector('.fail-tag,.done-tag,.mid-tag'); if(old) old.remove();
  const chev=head.querySelector('.chev'); const badge=outcomeBadge(r,false);
  if(badge && chev) chev.insertAdjacentHTML('beforebegin', badge);
}

function drawSpark(){
  const L=LIFTS[progLift]; const pts=[];
  for(let s=1;s<=TOTAL_SESSIONS;s++) if(appearsIn(L.day,s)) pts.push({s, w:workWeight(progLift,s), done:sessionLogged(s)});
  const ws=pts.map(p=>p.w), min=Math.min(...ws), max=Math.max(...ws), pad=8, W=320,H=120;
  const X=i=>pad+(W-2*pad)*i/(pts.length-1||1);
  const Y=w=>H-pad-(H-2*pad)*(w-min)/((max-min)||1);
  const line=pts.map((p,i)=>`${i?'L':'M'}${X(i).toFixed(1)},${Y(p.w).toFixed(1)}`).join(' ');
  const lastDone=Math.max(0,...pts.filter(p=>p.done).map(p=>p.s));
  const svg=document.getElementById('spark');
  svg.innerHTML=`
    <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${X(i).toFixed(1)}" cy="${Y(p.w).toFixed(1)}" r="${p.done?3.6:2}" fill="${p.done?'var(--warm)':'var(--faint)'}"><title>Sesión ${p.s}: ${p.w} kg${p.done?' ✓':''}</title></circle>`).join('')}`;
  const doneVals=pts.filter(p=>p.done);
  const ahora = doneVals.length? doneVals[doneVals.length-1].w : pts[0].w;
  document.getElementById('pstats').innerHTML=`
    <div class="stat-line">Peso inicial<b>${pts[0].w} kg</b></div>

    <div class="stat-line">Sesiones completadas (este movimiento)<b>${doneVals.length}/${pts.length}</b></div>`;
}

/* ---- CALENDARIO / PLAN ----
   Microciclo de 7 días: Fuerza · descanso · Fuerza · descanso · Fuerza · HIIT · descanso */
const CYCLE=['F','-','F','-','F','H','-'];
function planStartDate(){ return S.cfg.planStart || (S.logs[1] && S.logs[1].date) || null; }
function isoToDate(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
function dateToIso(dt){ return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; }
function daysBetween(aIso,bIso){ return Math.round((isoToDate(bIso)-isoToDate(aIso))/86400000); }
function formatEs(iso){ return isoToDate(iso).toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'}); }
function planAt(offset){
  if(offset<0 || offset>=WEEKS*7) return null;
  const week=Math.floor(offset/7)+1, pos=offset%7, slot=CYCLE[pos];
  if(slot==='-') return {type:'rest'};
  if(slot==='H') return {type:'hiit', week, tag:'HIIT 0'+hiitOfWeek(week)};
  const idx={0:1,2:2,4:3}[pos]; const sNum=(week-1)*3+idx;
  return {type:'fuerza', s:sNum, day:sNum%2?'A':'B'};
}
function offsetOfSession(n){ const week=Math.ceil(n/3), pos=[0,2,4][(n-1)%3]; return (week-1)*7+pos; }
function dateOfSession(n){ const st=planStartDate(); if(!st) return null; const dt=isoToDate(st); dt.setDate(dt.getDate()+offsetOfSession(n)); return dt; }
function loggedOnDate(iso){
  return Object.values(S.logs).some(l=>l.date===iso) || Object.values(S.hiit).some(h=>h.date===iso);
}

let calRef=null; // primer día del mes que se está viendo
function renderCalendario(){
  const st=planStartDate();
  if(!st){
    app.innerHTML=`<p class="eyebrow">Plan · Calendario</p>
      <h2 class="h-big" style="font-size:24px">¿Cuándo empiezas?</h2>
      <p class="sub">Pon la fecha de tu <b>primer entrenamiento</b> (Sesión 1, día A) y te proyecto todo el plan: qué toca cada día y cuándo terminarás la Fase I.</p>
      <div class="field"><label>Fecha del primer entrenamiento</label><input type="date" id="planstart" value="${new Date().toISOString().slice(0,10)}"></div>
      <button class="btn" id="setplan">Generar calendario</button>`;
    document.getElementById('setplan').onclick=()=>{ S.cfg.planStart=document.getElementById('planstart').value; save(); calRef=null; renderCalendario(); toast('Calendario generado'); };
    return;
  }
  if(!calRef){ const t=new Date(); calRef=new Date(t.getFullYear(),t.getMonth(),1); }
  const y=calRef.getFullYear(), m=calRef.getMonth();
  const monthName=calRef.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
  const startWd=(new Date(y,m,1).getDay()+6)%7;      // lunes = 0
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayIso=new Date().toISOString().slice(0,10);
  const endDt=dateOfSession(TOTAL_SESSIONS);

  let cells='';
  for(let i=0;i<startWd;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=dateToIso(new Date(y,m,d));
    const p=planAt(daysBetween(st,iso));
    let label='', cls='';
    if(p && p.type==='fuerza'){ label=`F·${p.day}`; cls='f'; }
    else if(p && p.type==='hiit'){ label='H'+hiitOfWeek(p.week); cls='h'; }
    cells+=`<div class="cal-cell ${cls} ${iso===todayIso?'today':''}">
      <span class="cal-d">${d}</span>${label?`<span class="cal-lab">${label}</span>`:''}${loggedOnDate(iso)?'<span class="cal-chk">✓</span>':''}</div>`;
  }
  app.innerHTML=`<p class="eyebrow">Plan · Calendario</p>
    <div class="cal-head">
      <button class="cal-nav" id="calprev">‹</button>
      <h2 class="cond" style="font-size:22px;text-transform:capitalize;margin:0">${monthName}</h2>
      <button class="cal-nav" id="calnext">›</button></div>
    <div class="cal-grid cal-dow">${['L','M','X','J','V','S','D'].map(x=>`<div>${x}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend"><span class="lg f"></span> Fuerza A/B <span class="lg h"></span> HIIT <span class="lg tdy"></span> Hoy · ✓ realizado</div>
    <div class="card"><div class="card-body" style="display:block;border:none">
      <div class="stat-line">Inicio del plan<b>${formatEs(st)}</b></div>
      <div class="stat-line">Fin estimado Fase I<b>${endDt?formatEs(dateToIso(endDt)):'—'}</b></div>
      <div class="stat-line">Próxima sesión (S${S.current})<b>${dateOfSession(S.current)?formatEs(dateToIso(dateOfSession(S.current))):'—'}</b></div>
    </div></div>
    <button class="btn ghost" id="calreset">Cambiar fecha de inicio</button>
    <p class="tiny center" style="margin-top:10px">Es una estimación. Si entrenas en otros días, tus fechas reales (✓) pueden no coincidir con el plan.</p>`;
  document.getElementById('calprev').onclick=()=>{ calRef=new Date(y,m-1,1); renderCalendario(); };
  document.getElementById('calnext').onclick=()=>{ calRef=new Date(y,m+1,1); renderCalendario(); };
  document.getElementById('calreset').onclick=()=>{ S.cfg.planStart=null; save(); calRef=null; renderCalendario(); };
}

function nutGramos(cal,pKg,chKg,peso){
  const P=Math.round(pKg*peso), CH=Math.round(chKg*peso);
  const G=Math.max(0,Math.round((cal-P*4-CH*4)/9));
  return {P,CH,G};
}

function nutCalcular(){
  const edad=+document.getElementById('nu_edad').value, alt=+document.getElementById('nu_alt').value,
        peso=+document.getElementById('nu_peso').value, grasa=parseFloat(document.getElementById('nu_grasa').value);
  const out=document.getElementById('nu_out');
  if(!(edad>0&&alt>0&&peso>0)){ out.innerHTML='<p class="tiny">Rellena edad, altura y peso.</p>'; return; }
  S.cfg.nutri={edad,altura:alt,peso,grasa:isNaN(grasa)?'':grasa}; save();
  const mifflin=10*peso+6.25*alt-5*edad+5;
  let tmb=mifflin, metodo='Harris-Benedict (Mifflin)';
  if(grasa>0&&grasa<60){ const magra=peso*(1-grasa/100); tmb=(mifflin+370+21.6*magra)/2; metodo='media Mifflin + Katch-McArdle'; }
  const mant=tmb*1.65, volumen=mant*1.125, defin=mant*0.85, defmax=peso*22;
  const rows=[
    {n:'Mantenimiento',s:'lo que gastas al día',cal:mant,m:nutGramos(mant,2,(mant*0.45/4)/peso,peso)},
    {n:'Volumen',s:'+10-15% · ganar músculo',cal:volumen,m:nutGramos(volumen,2,4.5,peso)},
    {n:'Definición',s:'−15% · perder grasa',cal:defin,m:nutGramos(defin,2.35,3,peso)},
    {n:'Definición máxima',s:'peso × 22 · fase dura',cal:defmax,m:nutGramos(defmax,2.5,0.8,peso)},
  ];
  out.innerHTML=`<div class="res-row"><div class="rn">Metabolismo basal<small>${metodo}</small></div><div class="kcal">${Math.round(tmb)}</div></div>`+
    rows.map(r=>`<div class="res-row"><div class="rn">${r.n}<small>${r.s}</small></div>
      <div style="text-align:right"><div class="kcal">${Math.round(r.cal)} kcal</div>
      <div class="macros">P ${r.m.P} · CH ${r.m.CH} · G ${r.m.G} g</div></div></div>`).join('')+
    `<p class="tiny" style="margin-top:10px">±10%. Si no progresas, ajusta ±100-150 kcal y reevalúa en 1-2 semanas.</p>`;
}

  document.getElementById('saveCfg').onclick=()=>{

  document.getElementById('resetBtn').onclick=()=>{ askConfirm('¿Borrar todo y empezar de cero? No se puede deshacer.', ()=>{ localStorage.removeItem(KEY); S=load(); if(!S.hiit)S.hiit={}; view='hoy'; render(); }, 'Reiniciar'); };

/* ---------- 7) Utilidades de UI ---------- */
let toastT;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1800); }

// ---- Temporizador de descanso (cuenta desde una marca de tiempo, así no se
//      desajusta aunque el navegador pase a segundo plano) ----
let restEnd=0, restInt=null;
function startRest(){
  const sec=S.cfg.restSec||120;
  restEnd=Date.now()+sec*1000;
  document.getElementById('rest').classList.add('show');
  if(restInt) clearInterval(restInt);
  tickRest(); restInt=setInterval(tickRest,250);
}
function tickRest(){
  const pill=document.getElementById('rest'), out=document.getElementById('rest-time');
  const ms=restEnd-Date.now();
  if(ms<=0){ clearInterval(restInt); restInt=null; out.textContent='¡Ya!'; beep();
    if(navigator.vibrate) navigator.vibrate([300,120,300]);
    setTimeout(()=>pill.classList.remove('show'),1400); return; }
  const s=Math.ceil(ms/1000);
  out.textContent=`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function stopRest(){ if(restInt)clearInterval(restInt); restInt=null; document.getElementById('rest').classList.remove('show'); }
function beep(){ try{ const c=new (window.AudioContext||window.webkitAudioContext)();
  const o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination);
  o.type='sine'; o.frequency.value=880; g.gain.setValueAtTime(.3,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.6); o.start(); o.stop(c.currentTime+.6);
}catch(e){} }

// Confirmación propia (funciona también dentro de marcos aislados)
function askConfirm(msg, onYes, yesLabel='Borrar'){
  const ov=document.getElementById('modal');
  document.getElementById('modal-msg').textContent=msg;
  const yes=document.getElementById('modal-yes'), no=document.getElementById('modal-no');
  yes.textContent=yesLabel;
  ov.classList.add('show');
  const close=()=>{ ov.classList.remove('show'); yes.onclick=null; no.onclick=null; ov.onclick=null; };
  yes.onclick=()=>{ close(); onYes(); };
  no.onclick=close;
  ov.onclick=(e)=>{ if(e.target===ov) close(); }; // tocar fuera = cancelar
}

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{ view=b.dataset.view; render(); window.scrollTo(0,0); });
document.getElementById('rest-skip').onclick=stopRest;

render();
